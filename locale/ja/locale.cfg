[mod-setting-description]
igg-expanded-search=内部プロトタイプ名に加えて、翻訳されたアイテム名でも実験的に検索できるようにします。既定では無効です。テスト目的の機能であり、大規模なMOD構成では互換性や性能上の問題が発生する可能性があります。

