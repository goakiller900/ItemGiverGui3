name: Build testing 3.0.2

on:
  push:
    branches:
      - testing-3.0.2

permissions:
  contents: read

jobs:
  build:
    name: Build Factorio 3.0.2 test archive
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read mod metadata
        id: metadata
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          info = json.loads(Path("info.json").read_text(encoding="utf-8"))
          archive = f"{info['name']}_{info['version']}.zip"
          print(f"archive={archive}")
          print(f"checksum={archive}.sha256")
          PY

      - name: Validate and build release archive
        run: python scripts/build_release.py

      - name: Upload ready-to-use Factorio mod
        uses: actions/upload-artifact@v7
        with:
          path: dist/${{ steps.metadata.outputs.archive }}
          if-no-files-found: error
          archive: false
          retention-days: 30

      - name: Upload checksum
        uses: actions/upload-artifact@v7
        with:
          path: dist/${{ steps.metadata.outputs.checksum }}
          if-no-files-found: error
          archive: false
          retention-days: 30
